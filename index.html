    <style>
        :root {
            /* 科技玄学风 深色模式 (默认) */
            --bg-color: #050505;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --primary: #00ff41; /* Matrix Green */
            --secondary: #9d00ff; /* Cyber Purple */
            --accent: #ffd700; /* Metaphysical Gold */
            --card-bg: rgba(10, 10, 12, 0.75);
            --card-border: rgba(0, 255, 65, 0.2);
            --nav-bg: rgba(5, 5, 5, 0.85);
            --glass-blur: blur(12px);
            --font-sys: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            --font-mono: "Consolas", "Courier New", monospace;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="light"] {
            /* 浅色模式 */
            --bg-color: #f4f4f9;
            --text-main: #222;
            --text-muted: #555;
            --primary: #008f11;
            --secondary: #7000cc;
            --accent: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 143, 17, 0.2);
            --nav-bg: rgba(244, 244, 249, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sys);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        ::selection { background: var(--primary); color: #000; }

        /* 矩阵背景画布 */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 布局容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--card-border);
            z-index: 1000;
            padding: 15px 0;
            transition: var(--transition);
        }
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            font-family: var(--font-mono);
            letter-spacing: 2px;
        }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .nav-links a:hover { color: var(--primary); }
        .action-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-sys);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:hover { background: var(--primary); color: #000; }

        /* 通用卡片 (Glassmorphism) */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            transition: var(--transition);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        /* Section 标题 */
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: "/>";
            color: var(--primary);
            font-family: var(--font-mono);
        }

        /* Hero 区域 */
        #hero { padding-top: 100px; }
        .hero-content { display: flex; gap: 40px; align-items: center; }
        .hero-avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            padding: 4px;
            background: #000;
            flex-shrink: 0;
        }
        .hero-avatar img, .hero-avatar svg {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--nav-bg);
        }
        .hero-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        .hero-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .badge {
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 255, 65, 0.3);
            font-family: var(--font-mono);
        }
        .badge.accent { border-color: var(--secondary); color: #fff; background: rgba(157, 0, 255, 0.2); }
        .contact-group { display: flex; gap: 15px; }

        /* 亮点与标签栏 */
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--card-border); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1rem;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
        }
        .tab-btn[aria-selected="true"] { color: var(--primary); border-bottom-color: var(--primary); font-weight: bold; }
        .tab-panel { display: none; animation: fadeIn 0.4s ease; }
        .tab-panel.active { display: block; }

        /* 经历列表 */
        .timeline-item { position: relative; padding-left: 20px; border-left: 2px solid var(--card-border); margin-bottom: 25px; }
        .timeline-item::before {
            content: "";
            position: absolute; left: -6px; top: 5px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }
        .timeline-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap;}
        .timeline-title { font-size: 1.2rem; font-weight: bold; color: var(--text-main); }
        .timeline-subtitle { color: var(--accent); font-size: 0.95rem; margin-right: 15px; }
        .timeline-date { font-family: var(--font-mono); color: var(--text-muted); font-size: 0.9rem; }
        .timeline-content ul { padding-left: 20px; color: var(--text-muted); }
        .timeline-content li { margin-bottom: 6px; }

        /* 项目卡片 Grid */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .project-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 20px;
            transition: var(--transition);
        }
        .project-card:hover { border-color: var(--secondary); background: rgba(157, 0, 255, 0.05); }
        .project-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: var(--text-main); }
        .project-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; }

        /* 技能矩阵 */
        .skill-group { margin-bottom: 20px; }
        .skill-group h4 { margin-bottom: 10px; color: var(--accent); font-weight: normal; }
        .skill-bar-container { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin-bottom: 15px; overflow: hidden;}
        .skill-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; }

        /* 页脚 */
        footer { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid var(--card-border); margin-top: 40px; }

        /* 动画 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 打印样式 */
        @media print {
            body { background: #fff !important; color: #000 !important; }
            #matrix-canvas, nav, .no-print { display: none !important; }
            .container { max-width: 100%; padding: 0; }
            .glass-card { box-shadow: none; border: 1px solid #ccc; background: transparent; break-inside: avoid; margin-bottom: 20px; padding: 20px;}
            * { color: #000 !important; text-shadow: none !important; }
            .badge { border: 1px solid #666; color: #333 !important; }
            #hero { padding-top: 0; }
            a { text-decoration: none; color: #000; }
            .timeline-item { border-left-color: #333; }
            .timeline-item::before { background: #333; box-shadow: none; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero-content { flex-direction: column; text-align: center; }
            .hero-avatar { margin: 0 auto; }
            .contact-group { justify-content: center; }
            .nav-links { display: none; /* 移动端精简导航 */ }
            .nav-inner { justify-content: center; position: relative; }
            .theme-toggle-wrapper { position: absolute; right: 0; }
        }

        /* 辅助类 */
        .mt-2 { margin-top: 20px; }
        .flex-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    </style>
</head>

                    <section id="education" class="glass-card" style="margin-bottom:0;">
                        <h2 class="section-title">教育与荣誉</h2>
                        <div class="timeline-item" style="border:none;">
                            <div class="timeline-header">
                                <span class="timeline-title">${resumeData.education[0].school}</span>
                                <span class="timeline-date">${resumeData.education[0].period}</span>
                            </div>
                            <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">${resumeData.education[0].major}</div>
                            <p style="font-size:0.9rem; color:var(--text-muted); margin-bottom:5px;">${resumeData.education[0].gpa}</p>
                            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;">核心课程: ${resumeData.education[0].courses}</p>
                        </div>
                        <h4 style="margin-bottom:10px; color:var(--text-main);">竞赛奖项</h4>
                        <ul style="padding-left:15px; font-size:0.85rem; color:var(--text-muted);">
                            ${resumeData.competitions.map(c => `<li style="margin-bottom:5px;">${c}</li>`).join('')}
                        </ul>
                    </section>
                </div>
            </main>

            <footer>
                <div class="container">
                    <p>© 2026 ${resumeData.personal.name} | AI & Frontend. Designed with Metaphysical Tech Vibe.</p>
                </div>
            </footer>
        `;

        // 修复打印时联系方式的显示
        const style = document.createElement('style');
        style.innerHTML = `@media print { .print-contact { display: block !important; margin-top:10px; font-weight:bold; } }`;
        document.head.appendChild(style);

        bindTabs();
        initMatrixRain();
    }

    function renderTimeline(items) {
        return items.map(item => `
            <div class="timeline-item">
                <div class="timeline-header">
                    <div>
                        <span class="timeline-title">${item.company}</span>
                        <div class="timeline-subtitle">${item.role}</div>
                    </div>
                    <span class="timeline-date">${item.period}</span>
                </div>
                <div class="timeline-content">
                    <ul>
                        ${item.desc.map(d => `<li>${d}</li>`).join('')}
                    </ul>
                </div>
            </div>
        `).join('');
    }

    // ---------------------------------------------------------
    // 3. 交互逻辑
    // ---------------------------------------------------------
    
    // Tab 切换逻辑 (支持键盘)
    function bindTabs() {
        const tabs = document.querySelectorAll('[role="tab"]');
        const panels = document.querySelectorAll('[role="tabpanel"]');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab, tabs, panels));
            tab.addEventListener('keydown', e => {
                let index = Array.from(tabs).indexOf(tab);
                if (e.key === 'ArrowRight') {
                    index = (index + 1) % tabs.length;
                    tabs[index].focus();
                    switchTab(tabs[index], tabs, panels);
                } else if (e.key === 'ArrowLeft') {
                    index = (index - 1 + tabs.length) % tabs.length;
                    tabs[index].focus();
                    switchTab(tabs[index], tabs, panels);
                }
            });
        });
    }

    function switchTab(selectedTab, allTabs, allPanels) {
        allTabs.forEach(t => t.setAttribute('aria-selected', 'false'));
        allPanels.forEach(p => p.classList.remove('active'));
        
        selectedTab.setAttribute('aria-selected', 'true');
        document.getElementById(selectedTab.getAttribute('aria-controls')).classList.add('active');
    }

    // 邮箱防爬虫拼接复制
    function copyEmail() {
        const email = resumeData.personal.emailUser + '@' + resumeData.personal.emailDomain;
        navigator.clipboard.writeText(email).then(() => {
            alert('邮箱已复制: ' + email);
        }).catch(err => {
            prompt('请手动复制:', email);
        });
    }

    // 主题切换
    function toggleTheme() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'light') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'light');
        }
    }

    // ---------------------------------------------------------
    // 4. Matrix Rain Vanilla JS 实现 (科技玄学风)
    // ---------------------------------------------------------
    function initMatrixRain() {
        const canvas = document.getElementById('matrix-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        let width, height;
        // 融合二进制与易经天干地支五行
        const characters = '01甲乙丙丁戊己庚辛壬癸子丑寅卯辰巳午未申酉戌亥乾坤震巽坎离艮兑';
        const chars = characters.split('');
        const fontSize = 16;
        let drops = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            const columns = Math.floor(width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100; // 随机初始高度打乱
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            
            // 背景褪色效果 (形成拖尾)
            ctx.fillStyle = isLight ? 'rgba(244, 244, 249, 0.1)' : 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 字体颜色
            ctx.fillStyle = isLight ? '#008f11' : '#00ff41';
            ctx.font = `${fontSize}px "Consolas", monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                
                // 绘制字符
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // 随机重置到底部之上
                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += 1;
            }
        }

        setInterval(draw, 33);
    }

    // 初始化运行
    document.addEventListener('DOMContentLoaded', initApp);

</script>
